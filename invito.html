<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FantaGaffe – Accetta il tuo invito</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2e2e4e;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 900; color: #e8c84a; letter-spacing: -1px; margin-bottom: 8px; }
    .tagline { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
    .invito-msg {
      background: #12122a;
      border-left: 4px solid #e8c84a;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 28px;
      font-size: 1rem;
      color: #ccc;
      text-align: left;
    }
    .invito-msg strong { color: #e8c84a; }
    label { display: block; text-align: left; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; margin-top: 16px; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #12122a;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #e8c84a; }
    input[readonly] { opacity: 0.6; cursor: not-allowed; }
    button {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: #e8c84a;
      color: #0f0f1a;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #f0d760; }
    button:disabled { background: #555; color: #999; cursor: not-allowed; }
    .messaggio { margin-top: 20px; font-size: 0.9rem; padding: 12px; border-radius: 8px; display: none; }
    .messaggio.errore { background: #2a1010; border: 1px solid #a33; color: #f88; display: block; }
    .messaggio.successo { background: #0f2a1a; border: 1px solid #3a3; color: #8f8; display: block; }
    .loading { color: #888; font-size: 0.9rem; margin: 20px 0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">FantaGaffe</div>
  <div class="tagline">Il fantasy game della politica italiana</div>
  <div id="stato-caricamento" class="loading">Caricamento invito...</div>
  <div id="contenuto" style="display:none">
    <div class="invito-msg" id="msg-invito"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="La tua email" />
    <label>Nickname</label>
    <input type="text" id="nickname" placeholder="Come vuoi essere chiamato?" maxlength="30" />
    <label>Nome</label>
    <input type="text" id="nome" placeholder="Il tuo nome" />
    <label>Cognome</label>
    <input type="text" id="cognome" placeholder="Il tuo cognome" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Minimo 8 caratteri" />
    <label>Conferma password</label>
    <input type="password" id="password2" placeholder="Ripeti la password" />
    <button id="btn-registrati" onclick="registrati()">Entra in FantaGaffe</button>
  </div>
  <div id="messaggio" class="messaggio"></div>
</div>
<script>
  const SUPABASE_URL = 'https://shkrdjqqeradgsucrfib.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoa3JkanFxZXJhZGdzdWNyZmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDE2NTAsImV4cCI6MjA5MDkxNzY1MH0.wxfwYednaNxhdpDLKZWuvrTLIt8clVHvmnhgTj8cqtA';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let tokenInvito = null;
  let invitanteId = null;
  let flusso = null;

  async function caricaInvito() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const ref = params.get('ref');

    if (!token && !ref) {
      document.getElementById('stato-caricamento').style.display = 'none';
      mostraErrore('Link non valido. Chiedi un nuovo invito.');
      return;
    }

    if (token) {
      flusso = 'email';
      tokenInvito = token;

      const { data, error } = await supabase
        .from('inviti')
        .select('id, invitante_id, email_invitato, stato')
        .eq('token', token)
        .single();

      document.getElementById('stato-caricamento').style.display = 'none';

      if (error || !data) {
        mostraErrore('Invito non trovato. Errore: ' + (error?.message || 'nessun dato'));
        return;
      }
      if (data.stato === 'accettato') {
        mostraErrore('Questo invito e\' gia\' stato usato. Ogni invito e\' valido una sola volta.');
        return;
      }
      if (data.stato === 'scaduto') {
        mostraErrore('Questo invito e\' scaduto. Chiedi un nuovo invito.');
        return;
      }

      invitanteId = data.invitante_id;
      const emailInput = document.getElementById('email');
      emailInput.value = data.email_invitato;
      emailInput.readOnly = true;

    } else {
      flusso = 'whatsapp';

      const { data, error } = await supabase
        .from('users')
        .select('id, nickname, nome')
        .eq('invite_code', ref)
        .single();

      document.getElementById('stato-caricamento').style.display = 'none';

      if (error || !data) {
        mostraErrore('Link non valido. Chiedi un nuovo link all\'amico che ti ha invitato.');
        return;
      }

      invitanteId = data.id;
    }

    let nomeInvitante = 'un amico';
    if (invitanteId) {
      const { data: userData } = await supabase
        .from('users')
        .select('nickname, nome')
        .eq('id', invitanteId)
        .single();
      if (userData) {
        nomeInvitante = userData.nickname || userData.nome || 'un amico';
      }
    }

    document.getElementById('msg-invito').innerHTML =
      'Sei stato invitato da <strong>' + nomeInvitante + '</strong> a entrare in FantaGaffe!';
    document.getElementById('contenuto').style.display = 'block';
  }

  async function registrati() {
    const email = document.getElementById('email').value.trim();
    const nickname = document.getElementById('nickname').value.trim();
    const nome = document.getElementById('nome').value.trim();
    const cognome = document.getElementById('cognome').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (!email) { mostraErrore('Inserisci la tua email.'); return; }
    if (!email.includes('@')) { mostraErrore('Email non valida.'); return; }
    if (!nickname) { mostraErrore('Inserisci un nickname.'); return; }
    if (nickname.length < 3) { mostraErrore('Il nickname deve avere almeno 3 caratteri.'); return; }
    if (!nome || !cognome) { mostraErrore('Inserisci nome e cognome.'); return; }
    if (password.length < 8) { mostraErrore('La password deve avere almeno 8 caratteri.'); return; }
    if (password !== password2) { mostraErrore('Le password non coincidono.'); return; }

    const btn = document.getElementById('btn-registrati');
    btn.disabled = true;
    btn.textContent = 'Registrazione in corso...';
    nascondiMessaggio();

    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { nickname, nome, cognome } }
    });

    if (authError) {
      mostraErrore('Errore durante la registrazione: ' + authError.message);
      btn.disabled = false;
      btn.textContent = 'Entra in FantaGaffe';
      return;
    }

    const userId = authData.user.id;

    const { error: userError } = await supabase
      .from('users')
      .insert({
        id: userId,
        email: email,
        nickname: nickname,
        nome: nome,
        cognome: cognome,
        invited_by: invitanteId,
        livello: 'membro',
        settimane_consecutive: 0,
        is_attivo_questa_settimana: false,
        stagione_corrente_punti: 0
      });

    if (userError) {
      if (userError.message.includes('duplicate') && userError.message.includes('nickname')) {
        mostraErrore('Questo nickname e\' gia\' in uso. Scegline un altro.');
      } else {
        mostraErrore('Errore nel salvataggio del profilo: ' + userError.message);
      }
      btn.disabled = false;
      btn.textContent = 'Entra in FantaGaffe';
      return;
    }

    if (flusso === 'email' && tokenInvito) {
      await supabase
        .from('inviti')
        .update({ stato: 'accettato', accepted_at: new Date().toISOString() })
        .eq('token', tokenInvito);
    }

    if (authData.session) {
      localStorage.setItem('sb_refresh', authData.session.refresh_token);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('contenuto').style.display = 'none';
      mostraSuccesso('Benvenuto in FantaGaffe! Controlla la tua email e clicca il link per confermare il tuo account. Poi accedi qui: <a href="login.html" style="color:#e8c84a;">Accedi</a>');
    }
  }

  function mostraErrore(msg) {
    const el = document.getElementById('messaggio');
    el.textContent = msg;
    el.className = 'messaggio errore';
  }

  function mostraSuccesso(msg) {
    const el = document.getElementById('messaggio');
    el.innerHTML = msg;
    el.className = 'messaggio successo';
  }

  function nascondiMessaggio() {
    const el = document.getElementById('messaggio');
    el.className = 'messaggio';
  }

  caricaInvito();
</script>
</body>
</html>
